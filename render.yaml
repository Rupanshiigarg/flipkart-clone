services:
  # Backend Service
  - type: web
    name: flipkart-clone-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: flipkart-clone-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DEFAULT_USER_ID
        value: 1

databases:
  # PostgreSQL Database
  - name: flipkart-clone-db
    plan: free
    region: oregon 
